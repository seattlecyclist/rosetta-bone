    - "dog committing to the meet-and-sniff and then catastrophically remembering it does not actually like other dogs"  # coward
    - "dog losing track of the other dog mid-introduction because someone is grilling four houses away"  # absurd
  variations_per_query: 3
  form: vignette

- prompt: "the vacuum cleaner being used"
  embed_queries:
