# Curated dog-life stimuli for SFT generation.
#
# Each entry produces  len(embed_queries) * variations_per_query  SFT
# requests. The angles in embed_queries are what drive variation:
#
#   - Each angle is independently embedded and used as the FAISS query
#     against all three pillar indexes, so different angles pull in
#     different chunks (different behavior rows, different science
#     passages, different style snippets).
#   - The angle is also surfaced to Claude as an `Angle:` hint in the
#     user block, so the generated story is recognizably *this* version
#     of the scene rather than a generic instance.
#
# Convention for angles: pick *behavioral or emotional or sensory*
# slices, not paraphrases. "dog hiding from loud mailman" retrieves
# different chunks than "dog begging mailman for treats". "the mail
# carrier arrives" retrieves the same chunks as the base prompt and
# adds nothing.

- prompt: "the mailman arriving"
  embed_queries:
    - "dog reacting aggressively to mailman at door"
    - "dog hiding from loud mailman delivery"
    - "dog greeting mailman with begging behavior"
  variations_per_query: 3
  form: diary

- prompt: "a trip to the vet"
