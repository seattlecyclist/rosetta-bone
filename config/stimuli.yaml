# Curated dog-life stimuli for SFT generation.
#
# Each entry produces  len(embed_queries) * variations_per_query  SFT
# requests. The angles in embed_queries are what drive variation:
#
#   - Each angle is independently embedded and used as the FAISS query
#     against all three pillar indexes, so different angles pull in
#     different chunks (different behavior rows, different science
#     passages, different style snippets).
#   - The angle is also surfaced to Claude as an `Angle:` hint in the
#     user block, so the generated story is recognizably *this* version
#     of the scene rather than a generic instance.
#
# ─── v9 design rule: comedic-mode spread ─────────────────────────────────
#
# Each angle is tagged inline with one of five comedic modes
# (see docs/comedic-modes.md for source canonicals + phrasing patterns):
#
#   - # delusion     — invented job / unearned authority / made-up importance
#   - # coward       — build dread → bail with a face-saving spin
#   - # absurd       — free-associative reasoning / hyper-distraction
#   - # rationalizer — mistaken premise stated as fact + casual aside
#   - # dissociator  — refuse to engage; pivot away; choose inner peace
#
# Per-stimulus rule: pick three of the five modes that fit the scene
# naturally and write one angle in each. The mode is a *stance toward
# the situation* — orthogonal to emotional valence, which is what
# dedup collapses on. Two angles with the same valence ("dog afraid
# of mailman" + "dog suspicious of mailman") collapse at dedup. Two
# angles with different modes ("dog charges then hides" coward +
# "dog ignores the mailman entirely" dissociator) do not collapse
# because the *behavioral shape* of the resulting stories differs.
#
# Aim for ~30 angles per mode across the corpus (150 / 5). v9
# rebalances away from the v5/v6/v7/v8 reliance on emotional-valence
# spread, which produced an adapter (v8) strong in absurd-distraction
# but weak in delusion + cowardly-deflation + dissociation.
#
# ─── v10: optional `modality:` per stimulus ─────────────────────────────
#
# `modality: smell | hearing` constrains science-pillar retrieval to
# chunks from papers whose title matches that modality. Use it on
# stimuli where the narrative arc hangs on one specific sense (e.g.,
# the v10 auditory additions: storm, vacuum, doorbell, fireworks,
# footsteps). When unset, retrieval searches the whole science pillar
# (v9 behaviour). The stamping happens at chunk time from the paper
# title via `ingest/modality.py:classify_title`.

- prompt: "the mailman arriving"
  embed_queries:
    - "dog convinced its barking single-handedly defeats the mailman every day"                    # delusion
    - "dog mounting a fierce defense from behind the couch where it cannot be seen by mailman"     # coward
    - "dog deciding the mailman situation is too much and just thinking about lunch instead"      # dissociator
  variations_per_query: 3
  form: diary

- prompt: "a trip to the vet"
  embed_queries:
    - "dog convinced the vet technician is here to be inspected by the dog and not the reverse"   # delusion
    - "dog plotting heroic escape from waiting room but freezing the moment a hand approaches"    # coward
    - "dog enduring the exam by mentally retreating to the memory of a single perfect tennis ball" # dissociator
  variations_per_query: 3
  form: vignette

- prompt: "owner returning home from work"
  embed_queries:
    - "dog conducting the official homecoming greeting ceremony with all the gravity it deserves"  # delusion
    - "dog forensically inventorying every smell on owner's clothes and following the wrong scent" # absurd
    - "dog initially convinced owner is a different person who has stolen owner's coat"            # rationalizer
  variations_per_query: 3
  form: diary

- prompt: "dinner being prepared in the kitchen"
  embed_queries:
    - "dog stationing itself in the official sous-chef position regardless of how many times told to move"  # delusion
    - "dog hyper-focused on a single onion fragment that fell weeks ago and trying to remember where"      # absurd
    - "dog pretending to leave the kitchen while actually crawling backwards under the table"              # coward
  variations_per_query: 3
  form: vignette

- prompt: "a thunderstorm at 3am"
  embed_queries:
    - "dog discovering the safest place is the bathtub it has spent years dramatically refusing"   # coward
    - "dog ignoring the storm entirely by aggressively grooming its left paw"                       # dissociator
    - "dog convinced this is finally the sky-cat coming to settle unfinished business with dogs"    # rationalizer
  variations_per_query: 3
  form: short_story

- prompt: "meeting another dog at the park"
  embed_queries:
